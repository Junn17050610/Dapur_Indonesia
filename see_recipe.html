<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detail Resep — Dapur Indonesia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── HERO ── */
    .recipe-hero {
      height: 320px;
      border-radius: var(--radius-xl);
      display: flex; align-items: center; justify-content: center;
      font-size: 8rem;
      position: relative; overflow: hidden;
      margin-bottom: 2rem;
    }
    .recipe-hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0) 40%, rgba(0,0,0,.35));
    }
    .hero-actions {
      position: absolute; bottom: 1.1rem; right: 1.1rem;
      display: flex; gap: .6rem; z-index: 2;
    }
    .hero-action-btn {
      display: flex; align-items: center; gap: .4rem;
      background: rgba(255,255,255,.9);
      backdrop-filter: blur(8px);
      border: none; cursor: pointer;
      padding: .5rem .95rem;
      border-radius: var(--radius-sm);
      font-size: .83rem; font-weight: 600;
      color: var(--text);
      transition: all .2s;
      text-decoration: none;
    }
    .hero-action-btn:hover { background: #fff; transform: translateY(-2px); text-decoration: none; }
    .hero-action-btn.fav-active { background: #FFE0E0; color: var(--red); }

    /* BACK */
    .back-link {
      display: inline-flex; align-items: center; gap: .45rem;
      color: var(--muted); font-size: .88rem;
      margin-bottom: 1.4rem;
      transition: color .15s;
      text-decoration: none;
    }
    .back-link:hover { color: var(--amber); text-decoration: none; }

    /* META */
    .recipe-meta-row {
      display: flex; align-items: center; flex-wrap: wrap; gap: .65rem;
      margin-bottom: .85rem;
    }
    .recipe-title {
      font-size: clamp(1.7rem, 4vw, 2.5rem);
      color: var(--text); margin-bottom: .65rem;
    }
    .recipe-desc {
      color: var(--muted); line-height: 1.78;
      font-size: .97rem; margin-bottom: 1.75rem;
      max-width: 680px;
    }

    /* STATS GRID */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 2.25rem;
    }
    .stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.1rem;
      text-align: center;
    }
    .stat-box-icon { font-size: 1.5rem; margin-bottom: .35rem; }
    .stat-box-val { font-family: var(--font-head); font-size: 1.25rem; font-weight: 700; color: var(--text); }
    .stat-box-label { font-size: .73rem; color: var(--muted); margin-top: .15rem; text-transform: uppercase; letter-spacing: .05em; }

    /* TWO COLUMNS LAYOUT */
    .detail-columns {
      display: grid;
      grid-template-columns: 1fr 1.7fr;
      gap: 2rem;
      margin-bottom: 2.25rem;
    }

    /* INGREDIENTS */
    .ingredients-list { display: flex; flex-direction: column; gap: .55rem; }
    .ing-item {
      display: flex; align-items: center; gap: .7rem;
      padding: .65rem .9rem;
      background: var(--surface);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-sm);
      font-size: .9rem;
    }
    .ing-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--amber-light); flex-shrink: 0; }
    .ing-name { flex: 1; color: var(--text); }
    .ing-amount { font-family: var(--font-mono); font-size: .8rem; color: var(--muted); white-space: nowrap; }

    /* STEPS */
    .steps-list { display: flex; flex-direction: column; gap: .9rem; }
    .step-item {
      display: flex; gap: 1rem; align-items: flex-start;
      background: var(--surface);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
      padding: 1rem 1.1rem;
    }
    .step-num {
      flex-shrink: 0;
      width: 2rem; height: 2rem;
      background: var(--amber); color: #fff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono); font-size: .83rem; font-weight: 700;
      margin-top: .1rem;
    }
    .step-text { flex: 1; line-height: 1.75; color: var(--text); font-size: .93rem; }

    /* TIPS */
    .tips-card {
      background: linear-gradient(135deg, #FFFBEB, #FEF3C7);
      border: 1.5px solid #FDE68A;
      border-radius: var(--radius-lg);
      padding: 1.4rem 1.6rem;
      margin-bottom: 2.25rem;
    }
    .tips-card h4 { color: #92400E; font-size: 1rem; margin-bottom: .6rem; }
    .tips-card p { color: #78350F; line-height: 1.75; font-size: .92rem; }

    /* AUTHOR */
    .author-card {
      display: flex; align-items: center; gap: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.1rem 1.3rem;
      margin-bottom: 2.25rem;
    }
    .author-info strong { display: block; font-size: .95rem; }
    .author-info span { font-size: .82rem; color: var(--muted); }

    /* REVIEWS */
    .review-card {
      background: var(--surface);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
      padding: 1.1rem 1.25rem;
      margin-bottom: .75rem;
    }
    .review-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: .5rem; }
    .reviewer { display: flex; align-items: center; gap: .6rem; }
    .reviewer strong { font-size: .9rem; }
    .review-stars { color: var(--gold); font-size: .85rem; letter-spacing: .05em; }
    .review-date { font-size: .75rem; color: var(--muted); }
    .review-text { font-size: .88rem; color: var(--text-2); line-height: 1.65; }

    /* RATING FORM */
    .rating-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 1.75rem;
      margin-top: 1.5rem;
    }
    .rating-section h4 { font-size: 1.1rem; margin-bottom: 1.1rem; }
    .star-rating-input { display: flex; gap: .4rem; font-size: 2rem; margin-bottom: .5rem; }
    .star-rating-input .star { cursor: pointer; color: var(--border); transition: color .15s, transform .15s var(--spring); }
    .star-rating-input .star.active,
    .star-rating-input .star:hover { color: var(--gold); transform: scale(1.2); }
    .star-rating-label { font-size: .82rem; color: var(--muted); height: 1.2rem; margin-bottom: .85rem; }

    /* TIMER MODAL */
    .timer-display {
      font-family: var(--font-mono);
      font-size: 4rem; font-weight: 500;
      text-align: center;
      color: var(--amber);
      background: var(--surface-2);
      border-radius: var(--radius-lg);
      padding: 1rem;
      margin-bottom: 1.25rem;
      letter-spacing: .05em;
    }
    .timer-presets { display: flex; gap: .6rem; flex-wrap: wrap; justify-content: center; margin-bottom: 1.25rem; }
    .timer-preset-btn {
      padding: .4rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-full);
      background: var(--surface);
      font-size: .83rem; font-weight: 600;
      color: var(--text-2); cursor: pointer;
      transition: all .18s;
    }
    .timer-preset-btn:hover { border-color: var(--amber); color: var(--amber); }
    .timer-controls { display: flex; gap: .75rem; justify-content: center; }

    @media (max-width: 900px) {
      .detail-columns { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
      .recipe-hero { height: 220px; font-size: 5rem; }
      .hero-actions { flex-wrap: wrap; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar" role="navigation" aria-label="Sidebar navigasi">
  <div class="sidebar-header">
    <a href="home_page.html" class="brand-logo">
      <span class="icon">🍳</span>
      <span class="wordmark">Dapur<em> Indonesia</em></span>
    </a>
  </div>
  <ul class="sidebar-nav" role="list">
    <li><a href="home_page.html"       class="nav-link" data-page="home"       role="listitem"><span class="nav-icon">🏠</span> Beranda</a></li>
    <li><a href="my_recipe.html"       class="nav-link" data-page="my-recipe"  role="listitem"><span class="nav-icon">📖</span> Resep Saya</a></li>
    <li><a href="add_recipe_page.html" class="nav-link" data-page="add-recipe" role="listitem"><span class="nav-icon">➕</span> Tambah Resep</a></li>
    <li><a href="profile_page.html"    class="nav-link" data-page="profile"    role="listitem"><span class="nav-icon">👤</span> Profil</a></li>
  </ul>
  <div class="sidebar-footer">
    <button class="btn btn-ghost btn-sm btn-full" id="logout-btn" style="justify-content:flex-start;gap:.5rem">🚪 Keluar</button>
  </div>
</nav>
<div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>

<!-- TOPBAR -->
<header class="app-navbar" role="banner">
  <div class="nav-left">
    <button class="hamburger-btn" id="hamburger-btn" aria-label="Toggle menu">☰</button>
    <a href="home_page.html" class="back-link" style="margin:0">← Kembali</a>
  </div>
  <div class="nav-right">
    <div class="avatar" id="user-avatar" onclick="window.location.href='profile_page.html'" title="Profil" style="cursor:pointer">👨‍🍳</div>
  </div>
</header>

<!-- MAIN -->
<div class="app-main">
  <main class="page-content" id="detail-content">
    <!-- Populated by JS -->
    <div style="text-align:center;padding:4rem;color:var(--muted)">
      <div style="font-size:3rem;margin-bottom:1rem">⏳</div>
      <p>Memuat resep…</p>
    </div>
  </main>
</div>

<!-- TIMER MODAL -->
<div class="modal-overlay hidden" id="timer-modal" role="dialog" aria-modal="true" aria-labelledby="timer-title">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="timer-title">⏱️ Timer Memasak</h3>
      <button class="modal-close" onclick="closeTimer()" aria-label="Tutup timer">✕</button>
    </div>
    <div class="modal-body">
      <div class="timer-display" id="timer-display" aria-live="polite">00:00</div>
      <div class="timer-presets" role="group" aria-label="Preset waktu">
        <button class="timer-preset-btn" onclick="setTimer(5)">5 mnt</button>
        <button class="timer-preset-btn" onclick="setTimer(10)">10 mnt</button>
        <button class="timer-preset-btn" onclick="setTimer(15)">15 mnt</button>
        <button class="timer-preset-btn" onclick="setTimer(30)">30 mnt</button>
        <button class="timer-preset-btn" onclick="setTimer(45)">45 mnt</button>
        <button class="timer-preset-btn" onclick="setTimer(60)">60 mnt</button>
      </div>
      <div class="timer-controls">
        <button class="btn btn-primary" id="timer-toggle-btn" onclick="toggleTimer()">▶ Mulai</button>
        <button class="btn btn-secondary" onclick="resetTimer()">↺ Reset</button>
      </div>
    </div>
  </div>
</div>

<div id="toast-container" role="status" aria-live="polite"></div>
<script src="shared.js"></script>
<script>
  requireAuth();
  initSidebar();

  const user = DB.getUser();
  if (user) document.getElementById('user-avatar').textContent = user.avatar || '👨‍🍳';

  document.getElementById('logout-btn').addEventListener('click', () => {
    DB.logout(); window.location.href = 'landing_page.html';
  });

  // Load recipe
  const recipeId = parseInt(localStorage.getItem('dn_active_recipe'));
  const recipes  = DB.getRecipes();
  const recipe   = recipes.find(r => r.id === recipeId);

  if (!recipe) {
    document.getElementById('detail-content').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">😕</div>
        <h3>Resep tidak ditemukan</h3>
        <p>Resep yang kamu cari tidak ada atau sudah dihapus.</p>
        <a href="home_page.html" class="btn btn-primary">← Kembali ke Beranda</a>
      </div>`;
  } else {
    document.title = `${recipe.name} — Dapur Indonesia`;
    renderDetail(recipe);
  }

  function renderDetail(r) {
    const favs  = DB.getFavs();
    const isFav = favs.includes(r.id);
    const diffClass = `badge diff diff-${r.difficulty.toLowerCase()}`;
    const isMine = r.isMine && user && r.authorName === user.name;

    const html = `
      <a href="home_page.html" class="back-link">← Kembali ke Beranda</a>

      <!-- HERO -->
      <div class="recipe-hero anim-fade-up" style="background:${r.bgLight}" aria-label="${r.name}">
        <span role="img" aria-hidden="true" style="position:relative;z-index:1">${r.emoji}</span>
        <div class="recipe-hero-overlay"></div>
        <div class="hero-actions">
          <button class="hero-action-btn ${isFav ? 'fav-active' : ''}"
                  id="fav-btn"
                  onclick="toggleFav(${r.id})"
                  aria-label="${isFav ? 'Hapus dari favorit' : 'Tambah ke favorit'}">
            ${isFav ? '❤️ Tersimpan' : '🤍 Favorit'}
          </button>
          <button class="hero-action-btn" onclick="openTimer()" aria-label="Buka timer">⏱️ Timer</button>
          <button class="hero-action-btn" onclick="window.print()" aria-label="Cetak resep">🖨️ Cetak</button>
          ${r.isMine ? `<a href="add_recipe_page.html" onclick="localStorage.setItem('dn_edit_id',${r.id})" class="hero-action-btn">✏️ Edit</a>` : ''}
          ${r.isMine ? `<button class="hero-action-btn" style="color:var(--red)" onclick="deleteRecipe(${r.id})">🗑️ Hapus</button>` : ''}
        </div>
      </div>

      <!-- META -->
      <div class="anim-fade-up-2">
        <div class="recipe-meta-row">
          <span class="badge badge-amber">${getCatLabel(r.category)}</span>
          <span class="${diffClass}">${r.difficulty}</span>
          <span class="badge badge-brown" style="color:var(--gold)">★ ${r.rating.toFixed(1)} (${r.ratingCount} ulasan)</span>
          ${r.isMine ? '<span class="badge badge-teal">📝 Resep Saya</span>' : ''}
        </div>
        <h1 class="recipe-title">${r.name}</h1>
        <p class="recipe-desc">${r.desc}</p>

        <!-- STATS -->
        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-box-icon">⏱️</div>
            <div class="stat-box-val">${r.time} mnt</div>
            <div class="stat-box-label">Waktu Masak</div>
          </div>
          <div class="stat-box">
            <div class="stat-box-icon">👥</div>
            <div class="stat-box-val">${r.serving}</div>
            <div class="stat-box-label">Porsi</div>
          </div>
          <div class="stat-box">
            <div class="stat-box-icon">📊</div>
            <div class="stat-box-val">${r.difficulty}</div>
            <div class="stat-box-label">Kesulitan</div>
          </div>
          <div class="stat-box">
            <div class="stat-box-icon">🧂</div>
            <div class="stat-box-val">${r.ingredients.length}</div>
            <div class="stat-box-label">Bahan</div>
          </div>
        </div>
      </div>

      <!-- TWO COLUMNS: Ingredients + Steps -->
      <div class="detail-columns anim-fade-up-3">
        <!-- INGREDIENTS -->
        <section aria-labelledby="ing-title">
          <h2 class="section-title" id="ing-title">🧂 Bahan-bahan</h2>
          <div class="ingredients-list">
            ${r.ingredients.map(ing => `
              <div class="ing-item">
                <span class="ing-dot" aria-hidden="true"></span>
                <span class="ing-name">${ing.name}</span>
                <span class="ing-amount">${ing.amount}</span>
              </div>
            `).join('')}
          </div>
        </section>

        <!-- STEPS -->
        <section aria-labelledby="steps-title">
          <h2 class="section-title" id="steps-title">👨‍🍳 Cara Memasak</h2>
          <div class="steps-list">
            ${r.steps.map((s, i) => `
              <div class="step-item">
                <span class="step-num" aria-label="Langkah ${i+1}">${i+1}</span>
                <p class="step-text">${s}</p>
              </div>
            `).join('')}
          </div>
        </section>
      </div>

      <!-- TIPS -->
      ${r.tips ? `
      <div class="tips-card anim-fade-up-4" role="note" aria-label="Tips memasak">
        <h4>💡 Tips Chef</h4>
        <p>${r.tips}</p>
      </div>` : ''}

      <!-- AUTHOR -->
      <div class="author-card">
        <div class="avatar">${r.authorAvatar || '👨‍🍳'}</div>
        <div class="author-info">
          <strong>${r.author || 'Chef Nusantara'}</strong>
          <span>Dibagikan pada ${formatDate(r.createdAt)}</span>
        </div>
      </div>

      <!-- REVIEWS -->
      <section aria-labelledby="reviews-title">
        <h2 class="section-title" id="reviews-title">💬 Ulasan (${(r.reviews || []).length})</h2>
        <div id="reviews-list">
          ${(r.reviews || []).length === 0
            ? `<p style="color:var(--muted);font-size:.9rem;margin-bottom:1.5rem">Belum ada ulasan. Jadilah yang pertama!</p>`
            : (r.reviews || []).map(rv => `
              <div class="review-card">
                <div class="review-header">
                  <div class="reviewer">
                    <div class="avatar" style="width:2rem;height:2rem;font-size:.9rem">${rv.avatar || '👤'}</div>
                    <div>
                      <strong>${rv.name}</strong>
                      <div class="review-stars">${'★'.repeat(rv.rating)}${'☆'.repeat(5 - rv.rating)}</div>
                    </div>
                  </div>
                  <span class="review-date">${rv.date}</span>
                </div>
                <p class="review-text">${rv.comment}</p>
              </div>
            `).join('')}
        </div>

        <!-- RATING FORM -->
        <div class="rating-section">
          <h4>✍️ Tulis Ulasanmu</h4>
          <div class="star-rating-input" role="group" aria-label="Pilih rating" id="star-input">
            <span class="star" data-val="1" tabindex="0" role="radio" aria-label="1 bintang">★</span>
            <span class="star" data-val="2" tabindex="0" role="radio" aria-label="2 bintang">★</span>
            <span class="star" data-val="3" tabindex="0" role="radio" aria-label="3 bintang">★</span>
            <span class="star" data-val="4" tabindex="0" role="radio" aria-label="4 bintang">★</span>
            <span class="star" data-val="5" tabindex="0" role="radio" aria-label="5 bintang">★</span>
          </div>
          <div class="star-rating-label" id="rating-label"></div>
          <div class="form-group">
            <textarea class="form-control" id="review-comment" rows="3"
                      placeholder="Ceritakan pengalamanmu memasak resep ini…"></textarea>
          </div>
          <button class="btn btn-primary" onclick="submitReview(${r.id})">Kirim Ulasan ✉️</button>
        </div>
      </section>
    `;

    document.getElementById('detail-content').innerHTML = html;

    // Star rating interactions
    let selectedRating = 0;
    const ratingLabels = ['', '😕 Mengecewakan', '🙁 Kurang enak', '😐 Biasa saja', '😊 Enak!', '🤩 Luar biasa!'];
    document.querySelectorAll('#star-input .star').forEach(star => {
      star.addEventListener('click', () => {
        selectedRating = parseInt(star.dataset.val);
        document.querySelectorAll('#star-input .star').forEach((s, i) => {
          s.classList.toggle('active', i < selectedRating);
        });
        document.getElementById('rating-label').textContent = ratingLabels[selectedRating] || '';
      });
      star.addEventListener('mouseover', () => {
        const val = parseInt(star.dataset.val);
        document.querySelectorAll('#star-input .star').forEach((s, i) => {
          s.classList.toggle('active', i < val);
        });
      });
      star.addEventListener('mouseout', () => {
        document.querySelectorAll('#star-input .star').forEach((s, i) => {
          s.classList.toggle('active', i < selectedRating);
        });
      });
    });

    window._selectedRating = () => selectedRating;
  }

  // FAV TOGGLE
  function toggleFav(id) {
    const btn  = document.getElementById('fav-btn');
    const favs = DB.getFavs();
    const idx  = favs.indexOf(id);
    if (idx === -1) {
      favs.push(id);
      btn.innerHTML = '❤️ Tersimpan';
      btn.classList.add('fav-active');
      showToast('❤️ Ditambahkan ke Favorit!');
    } else {
      favs.splice(idx, 1);
      btn.innerHTML = '🤍 Favorit';
      btn.classList.remove('fav-active');
      showToast('💔 Dihapus dari Favorit');
    }
    DB.setFavs(favs);
  }

  // DELETE RECIPE
  function deleteRecipe(id) {
    if (!confirm('Yakin ingin menghapus resep ini? Tindakan tidak bisa dibatalkan.')) return;
    const recipes = DB.getRecipes().filter(r => r.id !== id);
    DB.setRecipes(recipes);
    const favs = DB.getFavs().filter(f => f !== id);
    DB.setFavs(favs);
    showToast('🗑️ Resep berhasil dihapus');
    setTimeout(() => window.location.href = 'home_page.html', 1000);
  }

  // SUBMIT REVIEW
  function submitReview(id) {
    const rating  = window._selectedRating ? window._selectedRating() : 0;
    const comment = document.getElementById('review-comment').value.trim();
    if (!rating) return showToast('❗ Pilih bintang terlebih dahulu!');

    const recipes = DB.getRecipes();
    const recipe  = recipes.find(r => r.id === id);
    if (!recipe) return;

    if (!recipe.reviews) recipe.reviews = [];
    recipe.reviews.unshift({
      name:   user?.name || 'Chef Anonim',
      avatar: user?.avatar || '👤',
      rating,
      comment: comment || 'Resep yang lezat!',
      date:    new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' })
    });
    // Recalculate rating
    const total = recipe.reviews.reduce((sum, rv) => sum + rv.rating, 0);
    recipe.rating      = parseFloat((total / recipe.reviews.length).toFixed(1));
    recipe.ratingCount = recipe.reviews.length;

    DB.setRecipes(recipes);
    showToast(`⭐ Ulasan berhasil dikirim! Rating: ${rating}/5`);
    // Re-render after short delay
    setTimeout(() => { renderDetail(recipe); }, 600);
  }

  /* ── TIMER ── */
  let timerSec = 0, timerRunning = false, timerInterval = null;

  function openTimer() {
    document.getElementById('timer-modal').classList.remove('hidden');
  }
  function closeTimer() {
    document.getElementById('timer-modal').classList.add('hidden');
  }
  document.getElementById('timer-modal').addEventListener('click', function(e) {
    if (e.target === this) closeTimer();
  });

  function setTimer(minutes) {
    if (timerRunning) stopTimer();
    timerSec = minutes * 60;
    updateTimerDisplay();
  }
  function toggleTimer() {
    timerRunning ? stopTimer() : startTimer();
  }
  function startTimer() {
    if (timerSec === 0) return showToast('❗ Set waktu terlebih dahulu!');
    timerRunning = true;
    document.getElementById('timer-toggle-btn').textContent = '⏸ Pause';
    timerInterval = setInterval(() => {
      timerSec--;
      updateTimerDisplay();
      if (timerSec <= 0) {
        stopTimer();
        showToast('🔔 Timer selesai! Waktunya angkat masakan!');
      }
    }, 1000);
  }
  function stopTimer() {
    clearInterval(timerInterval);
    timerRunning = false;
    document.getElementById('timer-toggle-btn').textContent = '▶ Lanjut';
  }
  function resetTimer() {
    stopTimer();
    timerSec = 0;
    document.getElementById('timer-toggle-btn').textContent = '▶ Mulai';
    updateTimerDisplay();
  }
  function updateTimerDisplay() {
    const m = String(Math.floor(timerSec / 60)).padStart(2, '0');
    const s = String(timerSec % 60).padStart(2, '0');
    document.getElementById('timer-display').textContent = `${m}:${s}`;
  }
</script>
</body>
</html>
